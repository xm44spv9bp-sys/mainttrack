<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa areálu — 3D</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#2E7D32}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:#2E7D32}
.topbar{background:#1B5E20;padding:env(safe-area-inset-top,12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:52px}
.topbar-title{font-size:17px;font-weight:700;color:#fff}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.legend{display:flex;gap:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.8)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* MAP */
.map-wrap{flex:1;overflow:hidden;position:relative;background:linear-gradient(160deg,#4CAF50 0%,#388E3C 40%,#2E7D32 100%)}
.map-scroll{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch;position:relative}
.map-svg{display:block;min-width:100%;min-height:100%}

/* PIN */
.pin-group{cursor:pointer}
.pin-group:active .pin-circle{transform:scale(.9)}
.pin-shadow{fill:rgba(0,0,0,.2);filter:blur(3px)}
.pin-circle{transition:transform .15s}

/* TOOLTIP */
.pin-tooltip{
  position:absolute;
  background:#fff;
  border-radius:12px;
  padding:8px 12px;
  font-size:12px;
  font-weight:600;
  color:#1a1a18;
  white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  pointer-events:none;
  opacity:0;
  transform:translateY(4px);
  transition:opacity .2s,transform .2s;
  z-index:50;
}
.pin-tooltip.show{opacity:1;transform:translateY(0)}
.pin-tooltip::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top-color:#fff;
}

/* BOTTOM SHEET */
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);z-index:30;display:none;opacity:0;transition:opacity .3s}
.sheet-overlay.show{display:block;opacity:1}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:#fff;border-radius:24px 24px 0 0;
  padding:0;z-index:40;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:72%;
  display:flex;flex-direction:column;
}
.sheet.open{transform:translateY(0)}
.sheet-handle-wrap{padding:12px 16px 0;flex-shrink:0}
.sheet-handle{width:36px;height:4px;background:#E5E5EA;border-radius:2px;margin:0 auto 14px}
.sheet-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:0 16px 14px;border-bottom:.5px solid #F2F2F7;flex-shrink:0}
.sheet-loc{display:flex;align-items:center;gap:12px}
.sheet-loc-icon{width:46px;height:46px;border-radius:14px;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sheet-loc-name{font-size:18px;font-weight:800;color:#000}
.sheet-loc-meta{font-size:13px;color:#8E8E93;margin-top:2px}
.sheet-close{background:#F2F2F7;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:12px 16px}
.sheet-section-title{font-size:12px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.machine-row{display:flex;align-items:center;background:#F8F9FA;border-radius:14px;padding:12px 14px;margin-bottom:8px;gap:12px;cursor:pointer;transition:background .15s;border:.5px solid #F0F0F0}
.machine-row:active{background:#E8F5E9}
.machine-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.machine-info{flex:1;min-width:0}
.machine-name{font-size:14px;font-weight:700;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.machine-loc{font-size:12px;color:#8E8E93;margin-top:2px}
.machine-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0}
.ba{background:#2E7D32;color:#fff}
.bm{background:#F57C00;color:#fff}
.be{background:#D32F2F;color:#fff}
.sheet-btn{margin:8px 16px 20px;padding:15px;background:#2E7D32;color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;width:calc(100% - 32px);display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0}
.sheet-btn:active{opacity:.85}
.empty-loc{text-align:center;padding:32px;color:#8E8E93;font-size:14px}

/* STATUS BADGE na pine */
.status-ring-ok{stroke:#2E7D32}
.status-ring-warn{stroke:#F57C00}
.status-ring-err{stroke:#D32F2F}
</style>
</head>

            <div>
              <div class="sheet-loc-name" id="sheetName">—</div>
              <div class="sheet-loc-meta" id="sheetMeta">—</div>
            </div>
          </div>
          <button class="sheet-close" onclick="closeSheet()">×</button>
        </div>
      </div>
      <div class="sheet-body">
        <div class="sheet-section-title">Stroje na tejto lokácii</div>
        <div id="sheetMachines"></div>
      </div>
      <button class="sheet-btn" id="sheetBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        Zobraziť všetky stroje
      </button>
    </div>
  </div>
</div>

<script>
const LOCATIONS = {
  vyrobna:{
    name:'Výrobná hala',icon:'🏗️',
    meta:'Hlavná výrobná hala · 4 stroje · 1 porucha',
    status:'err',
    machines:[
      {icon:'🔩',name:'CNC Frézka TF-300',loc:'Pozícia A12',status:'ok'},
      {icon:'🤖',name:'Zvárací robot WR-200',loc:'Pozícia C07',status:'ok'},
      {icon:'⚙️',name:'Sústruh SU-450',loc:'Pozícia A08',status:'ok'},
      {icon:'🔄',name:'Dopravný pás DP-12',loc:'Linka 3',status:'err'},
    ]
  },
  admin:{
    name:'Administratíva',icon:'🏢',
    meta:'Administratívna budova · 1 stroj',
    status:'ok',
    machines:[
      {icon:'❄️',name:'Klimatizácia KL-1',loc:'Strojovňa',status:'ok'},
    ]
  },
  mlynica:{
    name:'Mlynica',icon:'🌾',
    meta:'Mlynský komplex · 3 stroje · 1 v údržbe',
    status:'warn',
    machines:[
      {icon:'⚙️',name:'Mlynský valec MV-1',loc:'Mlynica 1',status:'warn'},
      {icon:'🔩',name:'Čistička obilia C-3',loc:'Mlynica 2',status:'ok'},
      {icon:'⚡',name:'Elevátor EL-2',loc:'Silo A',status:'ok'},
    ]
  },
  sklad_hore:{
    name:'Skladové haly',icon:'🏪',
    meta:'Sklady vstupných surovín · 2 stroje',
    status:'ok',
    machines:[
      {icon:'🔄',name:'Nakladač NK-1',loc:'Sklad S1',status:'ok'},
      {icon:'⚡',name:'Vykládací dopravník VD-2',loc:'Sklad S2',status:'ok'},
    ]
  },
  sklad_lavy:{
    name:'Sklad surovín',icon:'📦',
    meta:'Ľavý sklad · 2 stroje',
    status:'ok',
    machines:[
      {icon:'🔄',name:'Pásový dopravník PD-1',loc:'Sklad L1',status:'ok'},
      {icon:'⚙️',name:'Triediaci stroj TS-3',loc:'Sklad L2',status:'ok'},
    ]
  },
  servis:{
    name:'Servisné centrum',icon:'🔧',
    meta:'Dielňa a servis · 2 stroje',
    status:'ok',
    machines:[
      {icon:'🔧',name:'Kompresor Atlas K-50',loc:'Servis S1',status:'ok'},
      {icon:'⚡',name:'Zvárací agregát ZA-2',loc:'Servis S2',status:'ok'},
    ]
  },
  hala_b:{
    name:'Hala B',icon:'🏭',
    meta:'Výrobná hala B · 3 stroje · 1 porucha',
    status:'err',
    machines:[
      {icon:'🔩',name:'Balička B-4',loc:'Linka 1',status:'ok'},
      {icon:'🔄',name:'Plniaca stanica PS-2',loc:'Linka 2',status:'err'},
      {icon:'⚙️',name:'Vákuová pumpa VP-1',loc:'Technická miestnosť',status:'ok'},
    ]
  },
  dielne:{
    name:'Dielne',icon:'🛠️',
    meta:'Opravovne a dielne · 2 stroje',
    status:'ok',
    machines:[
      {icon:'🔧',name:'Sústruh DS-1',loc:'Dielňa 1',status:'ok'},
      {icon:'⚡',name:'Zváračka DS-3',loc:'Dielňa 2',status:'ok'},
    ]
  },
  sklad_dole:{
    name:'Sklady hotových výrobkov',icon:'📫',
    meta:'Expedičné sklady · 2 stroje',
    status:'ok',
    machines:[
      {icon:'🔄',name:'Skladový vozík AV-1',loc:'Sklad E1',status:'ok'},
      {icon:'⚙️',name:'Paletizátor PA-2',loc:'Sklad E2',status:'ok'},
    ]
  },
};

function bc(s){return s==='ok'?'ba':s==='warn'?'bm':'be';}
function bgColor(s){return s==='ok'?'#E8F5E9':s==='warn'?'#FFF3E0':'#FFEBEE';}
function stLabel(s){return s==='ok'?'OK':s==='warn'?'Údržba':'Porucha';}

function openBuilding(id){
  const loc=LOCATIONS[id];
  if(!loc)return;
  document.getElementById('sheetIcon').textContent=loc.icon;
  document.getElementById('sheetName').textContent=loc.name;
  document.getElementById('sheetMeta').textContent=loc.meta;
  document.getElementById('sheetMachines').innerHTML=loc.machines.length
    ?loc.machines.map(m=>`
      <div class="machine-row">
        <div class="machine-icon" style="background:${bgColor(m.status)}">${m.icon}</div>
        <div class="machine-info">
          <div class="machine-name">${m.name}</div>
          <div class="machine-loc">${m.loc}</div>
        </div>
        <span class="machine-badge ${bc(m.status)}">${stLabel(m.status)}</span>
      </div>`).join('')
    :'<div class="empty-loc">Žiadne stroje na tejto lokácii</div>';
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheetOverlay').classList.add('show');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheetOverlay').classList.remove('show');
}
</script>
</body>
</html>
